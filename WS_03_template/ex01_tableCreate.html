    // 솔루션
    let age = 0;
    document.querySelector("#add").addEventListener("click", function(){
      let tb = document.getElementById("table");

      // 행 생성
      let row = tb.insertRow(tb.rows.length); //<tr>

      // 행에 td 추가
      row.insertCell(0).innerHTML = `<input tpye='text' name='name' value='jeje' />`;
      row.insertCell(1).innerHTML = `<input type="text" value="${age++}">`;
      row.insertCell(2).innerHTML = `<button value='삭제'>삭제</button>`;
    });

    // 행 삭제 m 
    document.querySelector("body").addEventListener("click", function(e){
      if (e.target.matches('[value=삭제]')) {
        let tr = e.target.parentElement.parentElement; // button -> td -> tr
        tr.parentElement.removeChild(tr);
        console.log("행 삭제");
      }
    });
  </script>
