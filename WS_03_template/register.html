    function banner() {
      let bannerList = ["국민의 은행이 되겠습니다.", "5060 웰컴패키지, 최대 7만원 혜택을 드립니다.", "타행이체, 자동이체 수수료 면제", "저녁 6시까지 영업합니다."]; 
      let index = 0;
      let bannerChange = function() {
        document.getElementById("banner").innerText = bannerList[index++];
        if(index === bannerList.length) {
          index = 0;
        }
      }
      // 1) 1초마다 배너 반복
      let bannerRepeat = setInterval(bannerChange, 1000);
    }
    banner();
    
    document.getElementById("signUp").addEventListener("click", function(e){

      let phone = document.querySelector("[name=phone]");
      let pw = document.querySelector("[name=password]");
      let pwConfirm = document.querySelector("[name=password2]");

      if(name.value === "") {
        alert("이름을 입력해 주세요");
        name.focus();
        return;
      }
      
      if(email.value === "") {
        alert("이메일을 입력해 주세요");
        email.focus();

        alert("이메일 형식이 아닙니다.");
        email.focus();
        return;
      }

      if(phone.value === "") {
        alert("핸드폰번호를 입력해 주세요");
        phone.focus();
        return;
      }
      
      if(pw.value === "") {
        alert("비밀번호를 입력해 주세요");
        pw.focus();
        return;

      if(pwConfirm.value === "") {

        pwConfirm.focus();
        return;
      }

      if(pw.value !== pwConfirm.value ) {
        alert("비밀번호가 일치하지 않습니다. 다시 입력해 주세요");
        pw.value = "";
        pwConfirm.value = "";
        pw.focus();
        return;
      }
