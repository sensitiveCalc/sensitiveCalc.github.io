<body>

 <div id="banner">지금 당신의 행복! IT's KOSTA Life!</div> 

 <main>
    <h1>Login</h1>
    <form action="index2.html" method="post">
      <div class="form-item">
        <label for="id">아이디</label>
        <input type="text" id="id" name="id">
      </div>
      <div class="form-item">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password">
      </div>
      <hr>
      <button id="login">로그인</button>
    </form>
</main>

    <!-- footer-->
    <footer>
      <ul>
        <li>경기도 성남시 오리역 한국소프트웨어진흥협회</li>
        <li>02-0000-0000</li>
      </ul>
    </footer>

    <script>
      function banner() {
      let bannerList = ["국민의 은행이 되겠습니다.", "5060 웰컴패키지, 최대 7만원 혜택을 드립니다.", "타행이체, 자동이체 수수료 면제", "저녁 6시까지 영업합니다."]; 
      let index = 0;
      let bannerChange = function() {
        document.getElementById("banner").innerText = bannerList[index++];
        if(index === bannerList.length) {
          index = 0;
        }
      }
      // 1) 1초마다 배너 반복
      let bannerRepeat = setInterval(bannerChange, 1000);
    }
    banner();
    
      // 로그인 버튼 클릭 이벤트
      document.getElementById("login").addEventListener("click", function(e){
        e.preventDefault();
        console.log("클릭");

        let idEle = document.querySelector("[name=id]");
        let pwEle = document.querySelector("[name=password]");

        // 아이디, 비밀번호 유효성 체크
        if(idEle.value === ""){
          alert("아이디에 값을 입력해 주세요");
          idEle.focus();
          return;
        }
        
        if(pwEle.value === ""){
          alert("비밀번호에 값을 입력해 주세요");
          pwEle.focus();
          return;
        }
        
        if (idEle.value !== null && pwEle.value !== null) {
          alert("입력유무 체크 완료 !!");
          return;
        }

      }, false);

    </script>
