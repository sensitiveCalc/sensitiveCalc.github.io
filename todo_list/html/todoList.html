<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/App.css">
<link rel="stylesheet" href="../css/Editor.css">
<link rel="stylesheet" href="../css/Header.css">
<link rel="stylesheet" href="../css/List.css">
<link rel="stylesheet" href="../css/TodoItem.css">
<script src="../js/todoList.js"></script>
<title>todo 리스트</title>
</head>
<body>
    <div class="App">
        <div class="Header">
            <h3>오늘의 Plan 😊</h3>
            <h1 id="today">2026-04-01</h1>
        </div>
        <form action="" name="" method="">
            <div class="Editor">
                <input type="text" placeholder="새로운 todo">
                <button>추가</button>
            </div>
        </form>
        <div class="List">
            <h4>Todo List</h4>
            <input type="text" id="keyword" placeholder="검색어를 입력해 주세요">
            <div class="todos_wrapper"></div>
        </div>
    </div>
</body>
</html>
